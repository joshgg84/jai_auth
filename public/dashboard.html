<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard - Jai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 24px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info span {
            color: #666;
            font-weight: 500;
        }
        
        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .logout-btn:hover {
            background: #c53030;
        }
        
        /* Stats Cards */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #666;
            margin-top: 5px;
        }
        
        /* Create Key Section */
        .create-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .create-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .create-form {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        
        .create-form .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .create-form label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 12px;
            font-weight: 500;
        }
        
        .create-form input, .create-form select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .create-form input:focus, .create-form select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .create-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            height: 42px;
        }
        
        .create-btn:hover {
            background: #5a67d8;
        }
        
        /* API Keys List */
        .keys-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .keys-section h3 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .key-card {
            background: #f7f7f7;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        
        .key-card:hover {
            transform: translateX(5px);
        }
        
        .key-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .key-name {
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }
        
        .key-date {
            font-size: 12px;
            color: #999;
        }
        
        .key-value {
            background: white;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            margin: 10px 0;
            border: 1px solid #e0e0e0;
        }
        
        .key-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .copy-btn {
            background: #38a169;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .copy-btn:hover {
            background: #2f855a;
        }
        
        .revoke-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .revoke-btn:hover {
            background: #c53030;
        }
        
        .no-keys {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        
        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }
        
        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .header {
                padding: 15px;
            }
            .create-form {
                flex-direction: column;
            }
            .create-form .form-group {
                width: 100%;
            }
            .create-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 Jai API Dashboard</h1>
            <div class="user-info">
                <span>👤 <span id="username"></span></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalKeys">0</div>
                <div class="label">Total API Keys</div>
            </div>
            <div class="stat-card">
                <div class="number" id="activeKeys">0</div>
                <div class="label">Active Keys</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalRequests">0</div>
                <div class="label">Total Requests</div>
            </div>
        </div>
        
        <!-- Create New API Key -->
        <div class="create-section">
            <h3>🔑 Create New API Key</h3>
            <div class="alert" id="alert"></div>
            <div class="create-form">
                <div class="form-group">
                    <label>Key Name (e.g., "My App", "Production")</label>
                    <input type="text" id="keyName" placeholder="Enter a name for this key">
                </div>
                <div class="form-group">
                    <label>Tier</label>
                    <select id="keyTier">
                        <option value="free">Free (2 req/min)</option>
                        <option value="pro" disabled>Pro (50 req/min) - Coming soon</option>
                    </select>
                </div>
                <button class="create-btn" onclick="createApiKey()">➕ Create Key</button>
            </div>
        </div>
        
        <!-- API Keys List -->
        <div class="keys-section">
            <h3>📋 Your API Keys</h3>
            <div id="keysList">
                <div class="no-keys">No API keys yet. Create your first key above.</div>
            </div>
        </div>
    </div>

    <script>
        // Get username from session
        const username = localStorage.getItem('jai_username');
        if (!username) {
            window.location.href = 'signup.html';
        }
        
        document.getElementById('username').textContent = username;
        
        // Storage key for API keys
        const STORAGE_KEY = 'jai_api_keys_' + username;
        
        // Load all API keys
        function loadKeys() {
            const keys = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            return keys;
        }
        
        // Save all API keys
        function saveKeys(keys) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(keys));
        }
        
        // Create new API key
        function createApiKey() {
            const keyName = document.getElementById('keyName').value.trim();
            if (!keyName) {
                showAlert('Please enter a key name', 'error');
                return;
            }
            
            const keys = loadKeys();
            
            const newKey = {
                id: 'key_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8),
                name: keyName,
                key: 'jai_' + Math.random().toString(36).substring(2) + 
                     Math.random().toString(36).substring(2) +
                     Math.random().toString(36).substring(2),
                tier: document.getElementById('keyTier').value,
                created_at: new Date().toISOString(),
                active: true,
                requests: 0
            };
            
            keys.push(newKey);
            saveKeys(keys);
            
            document.getElementById('keyName').value = '';
            renderKeys();
            updateStats();
            showAlert('✅ API Key created successfully!', 'success');
        }
        
        // Copy key to clipboard
        async function copyKey(key) {
            try {
                await navigator.clipboard.writeText(key);
                showAlert('✅ API Key copied to clipboard!', 'success');
            } catch(err) {
                showAlert('Failed to copy', 'error');
            }
        }
        
        // Revoke API key
        function revokeKey(keyId) {
            if (confirm('Are you sure you want to revoke this API key? This action cannot be undone.')) {
                let keys = loadKeys();
                keys = keys.filter(k => k.id !== keyId);
                saveKeys(keys);
                renderKeys();
                updateStats();
                showAlert('❌ API key revoked', 'success');
            }
        }
        
        // Render all keys
        function renderKeys() {
            const keys = loadKeys();
            const container = document.getElementById('keysList');
            
            if (keys.length === 0) {
                container.innerHTML = '<div class="no-keys">No API keys yet. Create your first key above.</div>';
                return;
            }
            
            container.innerHTML = keys.map(key => `
                <div class="key-card">
                    <div class="key-header">
                        <div class="key-name">🔑 ${escapeHtml(key.name)}</div>
                        <div class="key-date">Created: ${new Date(key.created_at).toLocaleDateString()}</div>
                    </div>
                    <div class="key-value">${maskKey(key.key)}</div>
                    <div class="key-actions">
                        <button class="copy-btn" onclick="copyKey('${key.key}')">📋 Copy Full Key</button>
                        <button class="revoke-btn" onclick="revokeKey('${key.id}')">🗑️ Revoke Key</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Mask key for display
        function maskKey(key) {
            if (key.length <= 20) return key;
            return key.substring(0, 15) + '...' + key.substring(key.length - 10);
        }
        
        // Update stats
        function updateStats() {
            const keys = loadKeys();
            const total = keys.length;
            const active = keys.filter(k => k.active).length;
            const totalReqs = keys.reduce((sum, k) => sum + (k.requests || 0), 0);
            
            document.getElementById('totalKeys').textContent = total;
            document.getElementById('activeKeys').textContent = active;
            document.getElementById('totalRequests').textContent = totalReqs;
        }
        
        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
        
        // Escape HTML
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Logout
        function logout() {
            localStorage.removeItem('jai_username');
            window.location.href = 'signup.html';
        }
        
        // Initialize
        renderKeys();
        updateStats();
    </script>
</body>
</html>
