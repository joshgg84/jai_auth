<!DOCTYPE html>
<html>
<head>
    <title>Login - Jai</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
        .error {
            color: red;
            margin: 10px 0;
            padding: 10px;
            background: #fed7d7;
            border-radius: 5px;
        }
        .success {
            color: green;
            margin: 10px 0;
            padding: 10px;
            background: #c6f6d5;
            border-radius: 5px;
        }
        .redirect {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .redirect a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login to Jai</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div id="message"></div>
        <div class="redirect">
            Don't have an account? <a href="signup.html">Sign up here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('jai_username', username);
                    messageDiv.innerHTML = '<div class="success">✅ Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.innerHTML = '<div class="error">❌ ' + data.error + '</div>';
                }
            } catch(err) {
                messageDiv.innerHTML = '<div class="error">❌ Connection error. Is the server running?</div>';
            }
        });
    </script>
</body>
</html>
